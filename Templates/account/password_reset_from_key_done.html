{% load static %}
<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Password Reset Sent</title>
    <link
      rel="shortcut icon"
      href="{% static 'img/image_2.jpg' %}"
      type="image/x-icon"
    />

    <link rel="stylesheet" href="{% static 'css/bootstrap.min.css' %}" />
    <link rel="stylesheet" href="{% static 'css/style.css' %}" />
  </head>

  <body style="background-color: #f8f9fa; min-height: 100vh">
    <div class="container py-5">
      <div class="row justify-content-center">
        <div class="col-md-5">
          <div class="card shadow p-5 text-center" style="border: none">
            <h3 class="text-success">Password Changed Successfully 🎉</h3>

            <p>You will be redirected to login shortly.</p>

            <!-- <a href="/accounts/login/" class="btn btn-primary w-100 mt-3">
              Go to Login
            </a> -->
          </div>
        </div>
      </div>
    </div>
    <script>
      setTimeout(function () {
        window.location.href = "/accounts/login/";
      }, 5000);
    </script>
  </body>
</html>
