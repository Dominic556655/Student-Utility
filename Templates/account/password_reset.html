{% load socialaccount %} {% load static %}

<!doctype html>
<html lang="en">
  <head>
    <title>Forgot Password — Ichason Lab</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link
      rel="shortcut icon"
      href="{% static 'img/image_2.jpg' %}"
      type="image/x-icon"
    />

    <link rel="stylesheet" href="{% static 'css/bootstrap.min.css' %}" />
    <link rel="stylesheet" href="{% static 'css/style.css' %}" />
  </head>

  <body style="background-color: #f8f9fa; min-height: 100vh">
    <div class="container py-5">
      <div class="row justify-content-center">
        <div class="col-12 col-sm-10 col-md-6 col-lg-5">
          <div class="card shadow p-5 text-center" style="border: none">
            <h3 class="text-center mb-4">Forgot Password</h3>

            <p class="text-muted text-center">
              Enter your email and we’ll send you a reset link.
            </p>

            <form method="POST">
              {% csrf_token %}

              <div class="form-group mb-3">
                <label>Email Address</label>
                <input
                  type="email"
                  name="email"
                  class="form-control"
                  placeholder="Enter your email"
                  required
                />
              </div>

              <button type="submit" class="btn btn-primary w-100">
                Send Reset Link
              </button>
            </form>

            <div class="text-center mt-3">
              <a href="{% url 'account_login' %}"> Back to Login </a>
            </div>
          </div>
        </div>
      </div>
      <div class="col-md-12 text-center">
        <p>
          <!-- Link back to Colorlib can't be removed. Template is licensed under CC BY 3.0. -->
          Copyright &copy;
          <script>
            document.write(new Date().getFullYear());
          </script>
          All rights reserved | Ichason—Lab
        </p>
      </div>
    </div>
  </body>
</html>
