{% load static %}
<!doctype html>
<html>
  <head>
    <title>Reset Password | Ichason-Lab</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link
      rel="shortcut icon"
      href="{% static 'img/image_2.jpg' %}"
      type="image/x-icon"
    />

    <link rel="stylesheet" href="{% static 'css/bootstrap.min.css' %}" />
    <link rel="stylesheet" href="{% static 'css/style.css' %}" />
  </head>

  <body style="background-color: #f8f9fa; min-height: 100vh">
    <div class="container py-5">
      <div class="row justify-content-center">
        <div class="col-12 col-sm-10 col-md-6 col-lg-5">
          <div class="card shadow p-3 p-md-5 text-center border-0">
            <h2 class="text-center mb-4">Create New Password</h2>

            <p class="text-muted text-center mb-4">
              Enter your new password below.
            </p>

            <form method="post">
              {% csrf_token %} {{ form.as_p }}

              <button type="submit" class="btn btn-primary w-100">
                Change Password
              </button>
            </form>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
